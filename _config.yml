title: Shift-Left Threat Modelling
description: >-
  PyTM + Semantic Compiler for shift-left threat modelling of a
  Gemini-style Managed RAG architecture — verifiable, auditable,
  reproducible.
remote_theme: just-the-docs/just-the-docs
url: "https://carlchinx.github.io"
baseurl: "/shift-left-threat-modelling"

# just-the-docs configuration
search_enabled: true
heading_anchors: true
color_scheme: light
aux_links:
  "GitHub Repo":
    - "https://github.com/carlchinx/shift-left-threat-modelling"
aux_links_new_tab: true

footer_content: >-
  © 2026 <a href="https://github.com/carlchinx">Dr. Charles C. Phiri</a>
  · MIT License · CITP, Senior IEEE Member, Fellow (ICTAM)

# SEO / social card image (Open Graph)
logo: "/out/architecture.png"
image: /out/architecture.png

# Keep Jekyll out of source/build/Python noise
exclude:
  - .venv/
  - .vscode/
  - __pycache__/
  - "**/__pycache__/"
  - "*.pyc"
  - .pytest_cache/
  - .mypy_cache/
  - node_modules/
  - package.json
  - package-lock.json
  - pyproject.toml
  - requirements.txt
  - app.py
  - gemini_threat_model.py
  - src/
  - .out/
  - build/
  - dist/
  - "*.egg-info/"
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/

# SEO / safety
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
